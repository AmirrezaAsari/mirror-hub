services:
  postgres:
    image: postgres:16-alpine
    container_name: mirror-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mirror}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mirror_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mirror_hub}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mirror} -d ${POSTGRES_DB:-mirror_hub}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mirror-hub-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-mirror}:${POSTGRES_PASSWORD:-mirror_secret}@postgres:5432/${POSTGRES_DB:-mirror_hub}?schema=public
    ports:
      - '${APP_PORT:-3000}:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
